<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IoT Dashboard Demo (No MQTT)</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f4f6f9;
      margin: 0;
      padding: 20px;
    }
    h2 { color: #333; }
    .card {
      max-width: 900px;
      margin: 20px auto;
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: transform 0.2s;
    }
    .card:hover {
      transform: scale(1.01);
    }
    canvas {
      width: 100% !important;
      height: 400px !important;
    }

    /* Overlay khi phóng to */
    .overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: rgba(0,0,0,0.8);
      display: flex;
      justify-content: center;
      align-items: center;
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 9999;
    }
    .overlay.active {
      visibility: visible;
      opacity: 1;
    }
    .overlay canvas {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      width: 90% !important;
      height: 80% !important;
    }
  </style>
</head>
<body>
  <h2>IoT Realtime Dashboard Demo (4 Node)</h2>
  <div class="card" id="chartCard">
    <canvas id="chart"></canvas>
  </div>

  <!-- Overlay chứa chart phóng to -->
  <div class="overlay" id="overlay">
    <canvas id="bigChart"></canvas>
  </div>

  <script>
    // Tạo chart chính
    const ctx = document.getElementById('chart').getContext('2d');
    const chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: [],
        datasets: [
          {label: 'Node1 ax', data: [], borderColor: 'red', fill: false},
          {label: 'Node2 ax', data: [], borderColor: 'blue', fill: false},
          {label: 'Node3 ax', data: [], borderColor: 'green', fill: false},
          {label: 'Node4 ax', data: [], borderColor: 'purple', fill: false}
        ]
      },
      options: {
        responsive: true,
        animation: false,
        interaction: { mode: 'nearest', intersect: false },
        plugins: { tooltip: { enabled: true } },
        scales: { x: {display: true}, y: {beginAtZero: true} }
      }
    });

    // Tạo chart phóng to (overlay)
    const bigCtx = document.getElementById('bigChart').getContext('2d');
    const bigChart = new Chart(bigCtx, {
      type: 'line',
      data: chart.data, // Dùng chung dataset
      options: {
        responsive: true,
        animation: false,
        interaction: { mode: 'nearest', intersect: false },
        plugins: { tooltip: { enabled: true } },
        scales: { x: {display: true}, y: {beginAtZero: true} }
      }
    });

    // Hàm sinh dữ liệu giả
    function addFakeData() {
      let time = new Date().toLocaleTimeString();

      if (chart.data.labels.length > 20) chart.data.labels.shift();
      chart.data.labels.push(time);

      for (let i = 0; i < 4; i++) {
        if (chart.data.datasets[i].data.length > 20) {
          chart.data.datasets[i].data.shift();
        }
        let fakeValue = (Math.sin(Date.now()/1000 + i) * 5 + Math.random()*2).toFixed(2);
        chart.data.datasets[i].data.push(fakeValue);
      }

      chart.update();
      bigChart.update();
    }

    setInterval(addFakeData, 1000);

    // Sự kiện click để phóng to
    const overlay = document.getElementById('overlay');
    document.getElementById('chartCard').addEventListener('click', () => {
      overlay.classList.add('active');
    });
    overlay.addEventListener('click', () => {
      overlay.classList.remove('active');
    });
  </script>
</body>
</html>
