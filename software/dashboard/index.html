<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IoT Dashboard Demo (No MQTT)</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- zoom out use mouse -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>

    <!-- use MQTT service -->
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>

    
</head>
<body>
    <h2>IoT Realtime Dashboard Demo (4 Node)</h2>
    <div class="card" id="ax">
        <!-- Add time box to filter data -->
        <div style="margin-bottom: 10px;">
        <label for="startTime">Start Time: </label>
        <input type="time" id="startTime">
        
        <label for="endTime" style="margin-left: 20px;">End Time: </label>
        <input type="time" id="endTime">
        
        <button onclick="filterData()">Filter</button>
        <button onclick="resetData()">Reset</button>
        </div>
        
        <!-- tag to display chart -->
        <canvas id="chart"></canvas>
    </div>

    <!-- <div class="overlay" id="overlay">
        <canvas id="bigChart"></canvas>
    </div> -->

    <script src="js/main.js"></script>

    <!-- Recieve data via mqtt -->
    <script src="js/mqttHandler.js"></script>

    <!-- Use to test data in chart -->
    <!-- <script src="js/fakeData.js"></script> -->

    <!-- <script src="js/overlay.js"></script> -->
</body>
</html>
