
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <script src="https://code.highcharts.com/highcharts.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<body>
  <!-- App bar -->
  <header class="appbar">
    <div class="brand">
      <div class="logo">EP</div>
      <div>Bridge SHM</div>
    </div>
    <nav class="tabs">
      <button class="tab active" data-tab="overview">Tổng quan theo khu vực</button>
      <!-- <button id="tab-chi-tiet-vi-tri" class="tab" data-tab="nodes">Chi tiết theo vị trí</button> -->
      <button class="tab" data-tab="alerts">Cảnh báo</button>
      <button class="tab" data-tab="map">Bản đồ</button>
    </nav>
    <div class="spacer"></div>
    <!-- <div class="user">Hello, <strong>Huy</strong></div> -->
  </header>

  <main class="container">
    <!-- KPI -->
    <section class="kpi-row">
      <div class="kpi-card">
        <div class="kpi-icon">🛰️</div>
        <div class="kpi-content">
          <div class="kpi-title">Tổng số nodes <span class="kpi-view" data-action="view-online">View</span></div>
          <div class="kpi-value" id="kpi-total">—</div>
        </div>
      </div>
      <div class="kpi-card">
        <div class="kpi-icon">🟢</div>
        <div class="kpi-content">
          <div class="kpi-title">Số Nodes Online <span class="kpi-view" data-action="view-online">View</span></div>
          <div class="kpi-value" id="kpi-online">—</div>
        </div>
      </div>
      <div class="kpi-card">
        <div class="kpi-icon">⛔</div>
        <div class="kpi-content">
          <div class="kpi-title">Số Nodes Offline <span class="kpi-view" data-action="view-online">View</span></div>
          <div class="kpi-value" id="kpi-offline">—</div>
        </div>
      </div>
      <div class="kpi-card">
        <div class="kpi-icon danger">⚠️</div>
        <div class="kpi-content">
          <div class="kpi-title">Số Nodes cảnh báo<span class="kpi-view" data-action="view-online">View</span></div>
          <div class="kpi-value" id="kpi-warnings">—</div>
        </div>
      </div>
    </section>

    <!-- Real-time charts -->
    
    <!-- Khu vực 1: danh sách node + trạng thái -->

    <section class="section" id="area-1-table-section">
      <div class="section-header">
        Danh sách node (Khu vực 1)
        <div class="section-tools">
          <button class="btn icon" id="btn-area-1-table-refresh" title="Làm mới">🔄</button>
        </div>
      </div>
      
      <div class="table">
        <div class="table-head">
          <div>#</div>
          <div>Node ID</div>
          <div>Tên vị trí</div>
          <div>Nhịp/Trụ</div>
          <div>Trạng thái</div>
          <div>Pin</div>
          <div>Nhiệt độ</div>
        </div>
        <div class="table-body" id="area-1-table-body"></div>
      </div>
    </section>

    <section class="section">
      <div class="section-header">Gia tốc rung động</div>
      <section class="section">
        <div id="chart-realtime-acc-node1" style="height:300px;"></div>
      </section>
      <section class="section">
        <div id="chart-realtime-acc-node2" style="height:300px;"></div>
      </section>
    </section>
